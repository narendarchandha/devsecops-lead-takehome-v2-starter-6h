apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-shim
  namespace: vault-shim
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-shim
  namespace: vault-shim
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
    resourceNames: ["vault-shim-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-shim
  namespace: vault-shim
subjects:
  - kind: ServiceAccount
    name: vault-shim
    namespace: vault-shim
roleRef:
  kind: Role
  name: vault-shim
  apiGroup: rbac.authorization.k8s.io
