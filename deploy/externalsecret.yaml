---
# Fake-provider SecretStore for local dev. The wired CI workflow installs
# the fake-provider stack via `make observability-up` + `make cluster-up`,
# and seeds the bearer-token-signing-key into the fake backend at
# `bootstrap.sh`.
#
# In production, this becomes a ClusterSecretStore pointing at AWS Secrets
# Manager + an IRSA-scoped ServiceAccount on the External Secrets Operator
# controller pod. See PRODUCTION_GAPS.md.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-shim-store
  namespace: vault-shim
spec:
  provider:
    fake:
      data:
        - key: "/vault-shim/runtime/signing-key"
          value: "fake-signing-key-rotate-via-ESO-in-prod"
          version: "v1"
        - key: "/vault-shim/runtime/bootstrap-token"
          value: "fake-bootstrap-token-rotate-via-ESO-in-prod"
          version: "v1"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-shim-runtime
  namespace: vault-shim
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-shim-store
    kind: SecretStore
  target:
    name: vault-shim-runtime
    creationPolicy: Owner
  data:
    - secretKey: signing_key
      remoteRef:
        key: "/vault-shim/runtime/signing-key"
    - secretKey: bootstrap_token
      remoteRef:
        key: "/vault-shim/runtime/bootstrap-token"
