# Pre-wired Grafana LGTM stack — DO NOT REWRITE WITHOUT DEFENDING in JUDGEMENT.md.
#
# Brings up: Loki + Tempo + Mimir + Grafana + Promtail + OTel Collector.
# `make observability-up` starts it; `make observability-down` tears it down.

name: observability

services:

  # --- Loki: log storage --------------------------------------------------

  loki:
    image: grafana/loki:3.2.1
    container_name: obs-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # --- Tempo: trace storage -----------------------------------------------

  tempo:
    image: grafana/tempo:2.6.1
    container_name: obs-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    ports:
      - "3200:3200"     # tempo http (queries)
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # --- Mimir: metrics storage (Prometheus-compatible) ---------------------

  mimir:
    image: grafana/mimir:2.14.1
    container_name: obs-mimir
    command: ["-config.file=/etc/mimir/mimir-config.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir-config.yaml:/etc/mimir/mimir-config.yaml:ro
      - mimir-data:/data
    # Note: no healthcheck. Mimir 2.x is distroless (no /bin/sh, no wget/curl
    # in the image), so the standard compose `CMD-SHELL` healthcheck pattern
    # can't run. Mimir is single-binary in "all" target mode here, so
    # `service_started` from depending containers is sufficient ordering.
    # Run `curl http://localhost:9009/ready` from the host to verify manually.

  # --- OTel Collector -----------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: obs-otel-collector
    command: ["--config=/etc/otel-collector/otel-collector-config.yaml"]
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8889:8889"     # Prometheus exporter (for the Collector's own metrics)
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otel-collector/otel-collector-config.yaml:ro
    depends_on:
      tempo:
        condition: service_healthy
      mimir:
        condition: service_started

  # --- Promtail: tails Docker container logs to Loki ----------------------

  promtail:
    image: grafana/promtail:3.2.1
    container_name: obs-promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  # --- Grafana ------------------------------------------------------------

  grafana:
    image: grafana/grafana:11.3.0
    container_name: obs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      mimir:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  loki-data:
  tempo-data:
  mimir-data:
  grafana-data:
