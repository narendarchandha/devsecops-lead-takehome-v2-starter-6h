# Promtail config — tails Docker container logs and ships them to Loki.
# Pulls log lines from the Docker socket so it picks up every container without
# the candidate having to wire mount paths per service.

server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name (sans leading "/") as the `container` label.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # The service we ship logs from — by convention, we tag it.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      # Add a `job` label for query convenience.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - target_label: job
        replacement: docker
    pipeline_stages:
      # If the log line is JSON (which yours should be), parse it and surface
      # well-known fields as Loki labels. This is how the Grafana derived_field
      # for trace_id sees the value.
      - json:
          expressions:
            level: level
            request_id: request_id
            trace_id: trace_id
            route: route
            status: status
      - labels:
          level:
          # NOTE: do NOT add trace_id as a label — that would explode cardinality.
          # The Loki datasource derivedFields regex extracts it from the log line
          # text itself at query time.
